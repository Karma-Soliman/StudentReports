name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup
      uses: actions/setup-node@v3
      with:
        node-version: '24.x'

    - name: Install dependencies 
      run: npm ci

    - name: Run build
      run: npm run build

    - name: Run tests
      run: npm test

    - name: Run lint
      run: npm run lint

  docker:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [quality, build-and-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      # Expose the image tage so downstream jobs can reference it
      image: ${{ steps.meta.outputs.tags}}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Github Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # Tag with the short commit SHA: sha-a3f9c12
            type=sha,prefix=sha-,format=short
            # Tag with the branch name: main
            type=ref,event=branch
            # Tag as latest when on the default branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags}}
          labels: ${{ steps.meta.outputs.labels}}
          # Use Github Actions cache to speed up layer reuse between runs
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker]
    environment:
      name: staging
      url: ${{ vars.RAILWAY_STAGING_URL }}

    steps:
      - name: Deploy image to Railway staging
        run: |
          SHA_TAG=$(echo "${{ needs.docker.outputs.image }}" \
            | tr ',' '\n' \
            | grep 'sha-' \
            | head -1 \
            | xargs)

          echo "Deploying image tag: $SHA_TAG"

          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-type: application/json" \
            -d "{
            \"query\": \"mutation { serviceInstanceRedeploy(serviceId: \\\"${{ secrets.RAILWAY_SERVICE_ID }}\\\", environmentId: \\\"${{ secrets.RAILWAY_ENVIRONMENT_ID }}\\\") }\"
            }" \
            https://backboard.railway.app/graphql/v2

          echo "Staging deployment triggered"d